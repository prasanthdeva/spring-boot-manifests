apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-app
  namespace: default
  labels:
    app: spring-boot-app
spec:
  replicas: 1 # Perfect budget limit for your 1-node Mumbai cluster
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: spring-boot-app
  template:
    metadata:
      labels:
        app: spring-boot-app
    spec:
      containers:
      - name: spring-boot-container
        # CRITICAL FIX: Changed to match your exact Docker Hub space. 
        # Jenkins automation matches this exact string prefix to insert the build numbers.
        image: 8667848270/spring-boot-cicd:21
        ports:
        - containerPort: 8080
        
        env:
        # Pulls basic environment settings from your public ConfigMap
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: spring-boot-config
              key: SPRING_PROFILES_ACTIVE

        # Scaled down resource allocations perfectly optimized for a single e2-medium node
        resources:
          requests:
            memory: "180Mi"
            cpu: "100m"
          limits:
            memory: "300Mi"
            cpu: "250m"

        # Basic health checks tailored for your Hello World endpoints (no actuator required)
        livenessProbe:
          httpGet:
            path: /   
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10